
[program:8050_python]
command=/bin/bash -c "source ~/.bashrc 2>/dev/null; exec python -m http.server 8050"
directory=/workspace/mechanic-shop
user=root
autostart=true
autorestart=true
startsecs=3
startretries=3
stderr_logfile=/var/log/supervisor/8050_python.err.log
stdout_logfile=/var/log/supervisor/8050_python.out.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2


